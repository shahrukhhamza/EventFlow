{% extends 'base.html' %}

{% block title %}Signup | UniEvents{% endblock %}

{% block content %}
<section class="container">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-6">
            <div class="auth-card p-4 p-md-5">
                <h2 class="mb-3">Create Account</h2>
                <p class="text-muted mb-4">Join the platform and start booking campus events.</p>

                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="name">Full Name</label>
                        <input id="name" type="text" name="name" placeholder="Your full name" class="form-control" minlength="2" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" name="email" placeholder="student@university.edu" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input id="password" type="password" name="password" class="form-control" minlength="6" required>
                        <small class="text-muted">Minimum 6 characters.</small>
                    </div>

                    <button class="btn btn-dark w-100" type="submit">Sign up</button>
                </form>

                <p class="small mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
